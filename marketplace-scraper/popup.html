<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 10px; margin: 0; }
    button { width: 100%; padding: 10px; background-color: #1877f2; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    button:hover { background-color: #166fe5; }
    button.secondary { margin-top: 8px; background: #1f2937; }
    button.secondary:hover { background: #111827; }
    button.danger { margin-top: 8px; background: #b91c1c; }
    button.danger:hover { background: #991b1b; }
    label { display: block; margin-top: 8px; font-size: 11px; font-weight: bold; color: #555; }
    input { width: 100%; box-sizing: border-box; margin-top: 3px; padding: 7px; border: 1px solid #ccd0d5; border-radius: 4px; font-size: 12px; }
    .settings { margin-bottom: 10px; padding: 8px; background: #f7f8fa; border: 1px solid #e4e6eb; border-radius: 6px; }
    .configured { margin-bottom: 10px; padding: 8px; background: #ecfdf5; border: 1px solid #bbf7d0; border-radius: 6px; color: #14532d; font-size: 12px; }
    details { margin-bottom: 10px; }
    summary { cursor: pointer; font-size: 11px; font-weight: bold; color: #555; }
    #output { margin-top: 10px; background: #f0f2f5; padding: 8px; border-radius: 5px; font-size: 11px; max-height: 250px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <h3>Marketplace Inventory Sync</h3>
  <div class="configured" id="configured-label">Configured from this extension build.</div>
  <details>
    <summary>Advanced connection settings</summary>
    <div class="settings">
      <label for="api-base-input">Backend URL</label>
      <input id="api-base-input" placeholder="https://marketplace-system-lf78.onrender.com">
      <label for="dealer-slug-input">Dealer Slug</label>
      <input id="dealer-slug-input" placeholder="lalalo-auto-llc">
      <label for="dealer-key-input">Dealer API Key</label>
      <input id="dealer-key-input" type="password" placeholder="Dealer key">
    </div>
  </details>
  <button id="sync-button">Scrape &amp; Save Listing</button>
  <button id="auto-button" class="secondary">Checking auto scan...</button>
  <button id="run-auto-button" class="secondary">Run Auto Scan Now</button>
  <button id="scan-profile-button" class="secondary">Scan Profile + Enrich</button>
  <button id="stop-button" class="danger">Stop Current Scan</button>
  <div id="output">Auto scan is ready.</div>
  <script src="popup.js"></script>
</body>
</html>
